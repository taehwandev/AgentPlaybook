<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient: Premium warm hanji paper -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF8F5" />
      <stop offset="100%" stop-color="#F2EDE2" />
    </linearGradient>

    <!-- Traditional Taoist / Sam-Taegeuk Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8373B" />
      <stop offset="50%" stop-color="#CCA250" />
      <stop offset="100%" stop-color="#1D3B6C" />
    </linearGradient>

    <!-- Title Gradient: Elegant Ink-to-Indigo -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#20242C" />
      <stop offset="100%" stop-color="#1D3B6C" />
    </linearGradient>

    <!-- Filters -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Traditional Korean Hanok Grid Pattern -->
  <path d="M 0,90 L 1200,90 M 0,180 L 1200,180 M 0,270 L 1200,270 M 0,360 L 1200,360 M 0,450 L 1200,450 M 0,540 L 1200,540"
        stroke="rgba(0, 0, 0, 0.02)" stroke-width="1.5" />
  <path d="M 150,0 L 150,630 M 300,0 L 300,630 M 450,0 L 450,630 M 600,0 L 600,630 M 750,0 L 750,630 M 900,0 L 900,630 M 1050,0 L 1050,630"
        stroke="rgba(0, 0, 0, 0.02)" stroke-width="1.5" />

  <!-- Ambient Glowing Orbs in Background -->
  <circle cx="200" cy="315" r="280" fill="#1D3B6C" opacity="0.04" filter="url(#softGlow)" />
  <circle cx="950" cy="150" r="250" fill="#C8373B" opacity="0.03" filter="url(#softGlow)" />

  <!-- Left Side: Glowing Branding Logo (Vector) -->
  <g transform="translate(120, 145)" filter="url(#softGlow)">
    <!-- White porcelain plate background for logo container -->
    <circle cx="170" cy="170" r="170" fill="rgba(255, 255, 255, 0.75)" stroke="rgba(0,0,0,0.04)" stroke-width="2" />
    <!-- Outer dash ring -->
    <circle cx="170" cy="170" r="150" fill="none" stroke="url(#logoGrad)" stroke-width="6" opacity="0.3" stroke-dasharray="10 10" />

    <!-- Stylized T stem -->
    <path d="M170 80 L170 260"
          fill="none" stroke="url(#logoGrad)" stroke-width="26" stroke-linecap="round" />

    <!-- Stylized T top bar -->
    <path d="M80 120 C120 80, 220 80, 260 120"
          fill="none" stroke="url(#logoGrad)" stroke-width="26" stroke-linecap="round" />

    <!-- Trigrams -->
    <path d="M70 70 L95 70" fill="none" stroke="#C8373B" stroke-width="6" stroke-linecap="round" />
    <path d="M245 270 L270 270" fill="none" stroke="#1D3B6C" stroke-width="6" stroke-linecap="round" />

    <!-- Core interactive AI node -->
    <circle cx="170" cy="150" r="16" fill="#ffffff" stroke="url(#logoGrad)" stroke-width="6" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.1))" />
  </g>

  <!-- Right Side: Clean Typography -->
  <g transform="translate(560, 240)">
    <!-- Label -->
    <text x="0" y="0" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="20" fill="#C8373B" letter-spacing="4">TAO AGENT OS</text>

    <!-- Title -->
    <text x="0" y="80" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="72" fill="url(#textGrad)" letter-spacing="-2">Tao Agent OS</text>

    <!-- Subtitle -->
    <text x="0" y="140" font-family="'Inter', sans-serif" font-weight="500" font-size="22" fill="#5A5F66">Smart shared discipline for AI coding agents.</text>

    <!-- Badges / Features -->
    <g transform="translate(0, 190)">
      <rect x="0" y="0" width="190" height="38" rx="8" fill="rgba(255, 255, 255, 0.8)" stroke="rgba(0, 0, 0, 0.05)" stroke-width="1.5" />
      <text x="95" y="24" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#20242C" text-anchor="middle">✓ Respects Local Rules</text>

      <rect x="205" y="0" width="190" height="38" rx="8" fill="rgba(255, 255, 255, 0.8)" stroke="rgba(0, 0, 0, 0.05)" stroke-width="1.5" />
      <text x="300" y="24" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#20242C" text-anchor="middle">✓ Selective Routing</text>

      <rect x="410" y="0" width="190" height="38" rx="8" fill="rgba(255, 255, 255, 0.8)" stroke="rgba(0, 0, 0, 0.05)" stroke-width="1.5" />
      <text x="505" y="24" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#20242C" text-anchor="middle">✓ Verified Evidence</text>
    </g>
  </g>
</svg>
